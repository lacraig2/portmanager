name: Docker publish

# Builds the slim image (static-musl client + BOTH Linux agents bundled) and
# pushes a multi-arch manifest to Docker Hub.
#
# Requires two repository secrets:
#   DOCKERHUB_USERNAME  -> lacraig2
#   DOCKERHUB_TOKEN     -> a Docker Hub access token with write on lacraig2/portmanager
#
# Publishes:
#   :latest        on push to main
#   :<version>     on a vX.Y.Z tag (plus :X.Y and :X)
#   :sha-<sha>     always

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & push lacraig2/portmanager
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the small arm64 runtime stage (apk add) run under emulation;
      # the heavy Rust build runs natively on the builder via zig cross-compile.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: lacraig2/portmanager
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
