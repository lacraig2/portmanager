name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build
        run: cross build --release --target ${{ matrix.target }}
      - name: Rename artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/portmanager \
             dist/portmanager-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: portmanager-${{ matrix.target }}
          path: dist/portmanager-${{ matrix.target }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: release-main
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Get next version
        uses: reecetech/version-increment@2023.10.1
        id: version
        with:
          use_api: true
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum portmanager-* > SHA256SUMS
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2.3.3
        with:
          tag_name: ${{ steps.version.outputs['v-version'] }}
          name: ${{ steps.version.outputs['v-version'] }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/portmanager-*
            dist/SHA256SUMS
          generate_release_notes: true
