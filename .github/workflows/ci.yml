name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            bin: portmanager
            ext: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            bin: portmanager
            ext: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            bin: portmanager
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            bin: portmanager
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            bin: portmanager
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            bin: portmanager.exe
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}
      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} \
             dist/portmanager-${{ matrix.target }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: portmanager-${{ matrix.target }}
          path: dist/portmanager-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: release-main
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get next version
        uses: reecetech/version-increment@2023.10.1
        id: version
        with:
          use_api: true
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Package clients with Linux agents
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p packages

          make_package() {
            local target="$1"
            local src="$2"
            local client_name="$3"
            local format="$4"
            local root="$RUNNER_TEMP/pkg-$target"
            local pkg="$root/portmanager-$target"
            rm -rf "$root"
            mkdir -p "$pkg/agents"
            cp "dist/$src" "$pkg/$client_name"

            for agent in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
              cp "dist/portmanager-$agent" "$pkg/agents/agent-$agent"
              chmod 0755 "$pkg/agents/agent-$agent"
            done

            if [[ "$client_name" != *.exe ]]; then
              chmod 0755 "$pkg/$client_name"
            fi

            if [[ "$format" == "zip" ]]; then
              (cd "$root" && zip -qr "$GITHUB_WORKSPACE/packages/portmanager-$target.zip" "portmanager-$target")
            else
              tar -C "$root" -czf "packages/portmanager-$target.tar.gz" "portmanager-$target"
            fi
          }

          make_package x86_64-unknown-linux-musl portmanager-x86_64-unknown-linux-musl portmanager tar
          make_package aarch64-unknown-linux-musl portmanager-aarch64-unknown-linux-musl portmanager tar
          make_package x86_64-unknown-linux-gnu portmanager-x86_64-unknown-linux-gnu portmanager tar
          make_package x86_64-apple-darwin portmanager-x86_64-apple-darwin portmanager tar
          make_package aarch64-apple-darwin portmanager-aarch64-apple-darwin portmanager tar
          make_package x86_64-pc-windows-msvc portmanager-x86_64-pc-windows-msvc.exe portmanager.exe zip
      - name: Checksums
        run: sha256sum dist/portmanager-* packages/* > dist/SHA256SUMS
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2.3.3
        with:
          tag_name: ${{ steps.version.outputs['v-version'] }}
          name: ${{ steps.version.outputs['v-version'] }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/portmanager-*
            packages/*
            dist/SHA256SUMS
          generate_release_notes: true
